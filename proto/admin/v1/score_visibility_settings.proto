syntax = "proto3";

package admin.v1;

import "google/protobuf/timestamp.proto";

option go_package = "github.com/ictsc/ictsc-regalia/backend/pkg/proto/admin/v1;adminv1";

message ScoreVisibilitySettings {
  optional google.protobuf.Timestamp ranking_freeze_at = 1;
}

message GetScoreVisibilitySettingsRequest {}
message GetScoreVisibilitySettingsResponse {
  ScoreVisibilitySettings settings = 1;
}

message UpdateScoreVisibilitySettingsRequest {
  ScoreVisibilitySettings settings = 1;
}
message UpdateScoreVisibilitySettingsResponse {}

service ScoreVisibilitySettingsService {
  rpc GetScoreVisibilitySettings(GetScoreVisibilitySettingsRequest) returns (GetScoreVisibilitySettingsResponse);
  rpc UpdateScoreVisibilitySettings(UpdateScoreVisibilitySettingsRequest) returns (UpdateScoreVisibilitySettingsResponse);
}
