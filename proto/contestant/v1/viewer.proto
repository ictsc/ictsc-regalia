syntax = "proto3";

package contestant.v1;

import "buf/validate/validate.proto";

option go_package = "github.com/ictsc/ictsc-regalia/backend/pkg/proto/contestant/v1;contestantv1";

message Viewer {
  string name = 1;
  ViewerType type = 2;
  oneof viewer {
    ContestantViewer contestant = 3;
    SignUpViewer sign_up = 4;
    UnauthenticatedViewer unauthenticated = 5;
  }
  ViewerAdmin admin = 6;
}

enum ViewerType {
  VIEWER_TYPE_UNSPECIFIED = 0;
  VIEWER_TYPE_CONTESTANT = 1;
  VIEWER_TYPE_SIGN_UP = 2;
  VIEWER_TYPE_UNAUTHENTICATED = 3;
}

message ContestantViewer {
  string name = 1;
  string display_name = 2;
  Impersonation impersonation = 3;
  // TODO: チームに関する情報が必要
  // コードかチーム自体か
}

message Impersonation {
  string admin_name = 1;
}

//サインアップ中のユーザ
message SignUpViewer {
  string name = 1;
  string display_name = 2;
}

message UnauthenticatedViewer {}

message ViewerAdmin {
  bool can_list_contestants = 1;
  bool can_impersonate_contestants = 2;
}

message ContestantSummary {
  string name = 1;
  string display_name = 2;
  string team_name = 3;
  int64 team_code = 4;
}

message GetViewerRequest {}
message GetViewerResponse {
  Viewer viewer = 1 [(buf.validate.field).required = true];
}

message ListContestantsRequest {}
message ListContestantsResponse {
  repeated ContestantSummary contestants = 1;
}

message SignUpRequest {
  string name = 1;
  string display_name = 2;
  string invitation_code = 3;
}
message SignUpResponse {}

service ViewerService {
  rpc GetViewer(GetViewerRequest) returns (GetViewerResponse);
  rpc ListContestants(ListContestantsRequest) returns (ListContestantsResponse);
  rpc SignUp(SignUpRequest) returns (SignUpResponse);
}
